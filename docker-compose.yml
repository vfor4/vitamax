services:
  course-composite:
    build: microservices/course-composite-service
    mem_limit: 512m
    environment:
      - SPRING_PROFILES_ACTIVE=dev
  course:
    build: microservices/course-service
    mem_limit: 512m
    environment:
      - SPRING_PROFILES_ACTIVE=dev
    depends_on:
      mongodb:
        condition: service_healthy
  recommendation:
    build: microservices/recommendation-service
    mem_limit: 512m
    environment:
      - SPRING_PROFILES_ACTIVE=dev
    depends_on:
      mongodb:
        condition: service_healthy
  review:
    build: microservices/review-service
    mem_limit: 512m
    environment:
      - SPRING_PROFILES_ACTIVE=dev
    depends_on:
      postgresql:
        condition: service_healthy
  discovery:
    build: microservices/discovery-service
    mem_limit: 512m
    environment:
      - SPRING_PROFILES_ACTIVE=dev
  gateway:
    build: microservices/gateway-service
    mem_limit: 512m
    environment:
      - SPRING_PROFILES_ACTIVE=dev
    ports:
      - "8080:8080"
  config:
    build: microservices/config-service
    mem_limit: 512m
    env_file:
      - .env
    environment:
      - SPRING_PROFILES_ACTIVE=dev

  mongodb:
    image: mongo:noble
    mem_limit: 512m
    ports:
      - "27017:27017"
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --quiet
      interval: 5s
      timeout: 2s
      retries: 5
    volumes:
      - mongo_data:/data/db
      - ./data-init/mongodb:/docker-entrypoint-initdb.d

  postgresql:
    image: postgres
    mem_limit: 512m
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./data-init/postgresql:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready" ]
      interval: 5s
      timeout: 2s
      retries: 2

  rabbitmq:
    image: rabbitmq:3-management
    mem_limit: 512m
    environment:
      RABBITMQ_DEFAULT_USER: user
      RABBITMQ_DEFAULT_PASS: password
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"

volumes:
  mongo_data:
  postgres_data:
  rabbitmq_data:
