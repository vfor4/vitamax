server.port: 8888
app.eureka-server: localhost
management:
  endpoint.health.show-details: "ALWAYS"
  endpoints.web.exposure.include: "*"
spring:
  application.name: gateway-service
  cloud:
    config.enabled: false
    gateway.server.webflux:
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:8888"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
            allowedHeaders:
              - "*"
            allowCredentials: true
      httpclient.connect-timeout: 5000
      routes:
        - id: course-composite
          uri: http://localhost:7005
          predicates:
            - Path=/api/**,/openapi/**
          filters:
            - name: CircuitBreaker
              args:
                name: course-composite-circuit-breaker
                fallbackUri: forward:/fallback
                statusCodes:
                  - 500
                  - 404
        - id: eureka-web-start
          uri: http://localhost:8761
          predicates:
            - Path=/eureka/web
          filters:
            - SetPath=/
        - id: eureka-web-other
          uri: http://localhost:8761
          predicates:
            - Path=/eureka/**
resilience4j:
  circuitbreaker:
    instances:
      course-composite-circuit-breaker:
        sliding-window-size: 10
        minimum-number-of-calls: 10
        permitted-number-of-calls-in-half-open-state: 3
        wait-duration-in-open-state: 5s
        failure-rate-threshold: 60
        ignore-failure-predicate: com.vitamax.gateway_service.resilience.predicate.ServerExceptionPredicate
  timelimiter:
    instances:
      course-composite-circuit-breaker:
        timeout-duration: 10s
eureka:
  instance:
    appname: ${spring.application.name}
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 30
  client:
    healthcheck.enabled: true
    initial-instance-info-replication-interval-seconds: 10
    registry-fetch-interval-seconds: 10
    service-url.defaultZone: http://username:password@localhost:8761/eureka/
  level:
    com.netflix.eureka: info
    com.netflix.discovery: info