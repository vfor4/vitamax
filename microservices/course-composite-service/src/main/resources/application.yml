server.port: 7005
spring:
  application:
    name: course-composite-service
  rabbitmq:
    host: localhost
    port: 5672
    username: user
    password: password
  cloud:
    stream:
      bindings:
        courseCreate-out-0:
          destination: course.create
        courseUpdate-out-0:
          destination: course.update
        courseDelete-out-0:
          destination: course.delete
        reviewCreate-out-0:
          destination: review.create
        reviewUpdate-out-0:
          destination: review.update
        reviewDelete-out-0:
          destination: review.delete
        recommendationCreate-out-0:
          destination: recommendation.create
        recommendationUpdate-out-0:
          destination: recommendation.update
        recommendationDelete-out-0:
          destination: recommendation.delete
logging.level.org: debug
eureka:
  client:
    fetch-registry: true
    register-with-eureka: true
    registry-fetch-interval-seconds: 5
    service-url:
      defaultZone: http://username:password@localhost:8761/eureka/

management:
  endpoint:
    health:
      show-details: ALWAYS

springdoc:
  swagger-ui.path: /openapi/swagger-ui.html
  api-docs.path: /openapi/v3/api-docs

---
spring.config.activate.on-profile: docker
server.port: 8080
eureka:
  client:
    service-url:
      defaultZone: http://discovery:8761/eureka/
