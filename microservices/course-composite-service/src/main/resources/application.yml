server.port: 7005
spring.application.name: course-composite-service
logging:
  level:
    org: debug
eureka:
  client:
    fetch-registry: true
    registry-fetch-interval-seconds: 5
    register-with-eureka: false

management:
  endpoint:
    health:
      show-details: ALWAYS
---
spring.config.activate.on-profile: docker
server.port: 8080
eureka:
  client:
    service-url:
      defaultZone: http://discovery:8761/eureka/