server.port: 7005
spring.application.name: course-composite-service
logging:
  level:
    root: debug
spring:
  config.import: "optional:configserver:"
  cloud:
    stream:
      bindings:
        courseCreate-out-0:
          destination: course.create
        courseUpdate-out-0:
          destination: course.update
        courseDelete-out-0:
          destination: course.delete
        reviewCreate-out-0:
          destination: review.create
        reviewUpdate-out-0:
          destination: review.update
        reviewDelete-out-0:
          destination: review.delete
        recommendationCreate-out-0:
          destination: recommendation.create
        recommendationUpdate-out-0:
          destination: recommendation.update
        recommendationDelete-out-0:
          destination: recommendation.delete
  rabbitmq:
    username: user
    password: password
    port: 5672
springdoc:
  swagger-ui.path: /openapi/swagger-ui.html
  api-docs.path: /openapi/v3/api-docs

---
spring.config.activate.on-profile: dev
spring.cloud.config:
  uri: http://config:8080
  fail-fast: true
  retry:
    max-attempts: 10
    initial-interval: 1100
    max-interval: 1500
    multiplier: 1.2
