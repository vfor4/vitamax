server.port: 7003
spring:
  application.name: recommendation-service
  data:
    mongodb:
      host: "127.0.0.1"
      port: 27017
      auto-index-creation: true
  rabbitmq:
    port: 5672
    username: user
    password: password
  cloud:
    config.enabled: false
    function.definition: recommendationCreate;recommendationUpdate;recommendationDelete
    stream:
      default:
        group: ${spring.application.name}
        consumer:
          max-attempts: 3
          back-off-initial-interval: 1000
          back-off-max-interval: 10000
          back-off-multiplier: 2.0
      bindings:
        recommendationCreate-in-0:
          destination: recommendation.create
        recommendationUpdate-in-0:
          destination: recommendation.update
        recommendationDelete-in-0:
          destination: recommendation.delete