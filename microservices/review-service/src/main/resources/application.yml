server.port: 7004
spring:
  application.name: review-service
  r2dbc:
    url: "r2dbc:postgresql://localhost:5432/postgres"
    username: "postgres"
    password: "postgres"
  rabbitmq:
    username: user
    password: password
    port: 5672
  cloud:
    config.enabled: false
    function.definition: reviewCreate;reviewUpdate;reviewDelete
    stream:
      default:
        group: ${spring.application.name}
        consumer:
          max-attempts: 3
          back-off-initial-interval: 1000
          back-off-max-interval: 10000
          back-off-multiplier: 2.0
      bindings:
        reviewCreate-in-0.destination: review.create
        reviewUpdate-in-0.destination: review.update
        reviewDelete-in-0.destination: review.delete
eureka:
  instance:
    appname: ${spring.application.name}
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 30
  client:
    healthcheck.enabled: true
    initial-instance-info-replication-interval-seconds: 10
    registry-fetch-interval-seconds: 10
    service-url.defaultZone: http://username:password@localhost:8761/eureka/
logging:
  level:
    com.netflix.eureka: info
    com.netflix.discovery: info