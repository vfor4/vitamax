server.port: 7004
spring:
  application.name: review-service
  r2dbc:
    url: "r2dbc:postgresql://${POSTGRESQL_HOST:localhost}:${POSTGRESQL_PORT:5432}/postgres"
    username: ${POSTGRES_USERNAME:postgres}
    password: ${POSTGRES_PASSWORD:postgres}
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    username: ${RABBITMQ_USER:user}
    password: ${RABBITMQ_PWD:password}
    port: ${RABBITMQ_PORT:5672}
  cloud:
    function.definition: reviewCreate;reviewUpdate;reviewDelete
    stream:
      default:
        group: ${spring.application.name}
        consumer:
          max-attempts: 3
          back-off-initial-interval: 1000
          back-off-max-interval: 10000
          back-off-multiplier: 2.0
      bindings:
        reviewCreate-in-0.destination: review.create
        reviewUpdate-in-0.destination: review.update
        reviewDelete-in-0.destination: review.delete