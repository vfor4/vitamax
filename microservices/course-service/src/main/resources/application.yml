server.port: 7002
spring.application.name: course-service

spring:
  config.import: "optional:configserver:"
  data:
    mongodb:
      host: "127.0.0.1"
      port: 27017
      auto-index-creation: true
  rabbitmq:
    username: user
    password: password
    port: 5672
  cloud:
    function:
      definition: courseCreate;courseUpdate;courseDelete
    stream:
      default:
        group: ${spring.application.name}
        consumer:
          max-attempts: 3
          back-off-initial-interval: 1000
          back-off-max-interval: 10000
          back-off-multiplier: 2.0
      bindings:
        courseCreate-in-0:
          destination: course.create
        courseUpdate-in-0:
          destination: course.update
        courseDelete-in-0:
          destination: course.delete
eureka:
  client:
    fetch-registry: false
---
spring.config.activate.on-profile: dev
spring.cloud.config:
  uri: http://config:8080
  fail-fast: true
  retry:
    max-attempts: 10
    initial-interval: 1100
    max-interval: 1500
    multiplier: 1.2
