server.port: 7002
spring:
  application.name: course-service
  data:
    mongodb:
      host: "127.0.0.1"
      port: 27017
      auto-index-creation: true
  rabbitmq:
    username: user
    password: password
    port: 5672
  cloud:
    config.enabled: false
    function.definition: courseCreate;courseUpdate;courseDelete
    stream:
      default:
        group: ${spring.application.name}
        consumer:
          max-attempts: 3
          back-off-initial-interval: 1000
          back-off-max-interval: 10000
          back-off-multiplier: 2.0
      bindings:
        courseCreate-in-0.destination: course.create
        courseUpdate-in-0.destination: course.update
        courseDelete-in-0.destination: course.delete
eureka:
  instance:
    appname: ${spring.application.name}
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 30
  client:
    healthcheck.enabled: true
    initial-instance-info-replication-interval-seconds: 10
    registry-fetch-interval-seconds: 10
    service-url.defaultZone: http://username:password@localhost:8761/eureka/
logging:
  level:
    com.netflix.eureka: info
    com.netflix.discovery: info

