#        include:
#          "*"
---
spring.config.activate.on-profile: docker
server.port: 8080
spring:
  data:
    mongodb:
      host: mongodb
      port: 27017
  rabbitmq:
    host: rabbitmq

eureka:
  client:
    service-url:
      defaultZone: http://discovery:8761/eureka/