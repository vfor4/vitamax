server.port: 80
spring:
  cloud.gateway.server.webflux:
    routes:
      - id: course-composite
        uri: http://course-composite-service
        predicates:
          - Path=/api/**,/openapi/**
        filters:
          - name: CircuitBreaker
            args:
              name: course-composite-circuit-breaker
              fallbackUri: forward:/fallback
management:
  endpoint.health.probes.enabled: true
  endpoint.health.group.readiness.include: "readinessState"

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    reactor.netty.http.client: DEBUG
